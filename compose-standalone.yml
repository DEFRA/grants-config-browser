services:

# complete setup to run browser and it's direct dependencies

  localstack:
    image: localstack/localstack:3.0.2
    ports:
      - '4566:4566' # LocalStack Gateway
      - '4510-4559:4510-4559' # external services port range
    env_file:
      - 'compose/aws.env'
    environment:
      DEBUG: ${DEBUG:-1}
      LS_LOG: WARN # Localstack DEBUG Level
      SERVICES: s3,sqs,sns
      LOCALSTACK_HOST: 127.0.0.1
    volumes:
      - '${TMPDIR:-/tmp}/localstack:/var/lib/localstack'
      - ./compose/start-localstack.sh:/etc/localstack/init/ready.d/start-localstack.sh
    healthcheck:
      test: ['CMD', 'curl', 'localhost:4566']
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - grants-framework

  redis:
    image: redis:7.2.3-alpine3.18
    ports:
      - '6379:6379'
    restart: always
    networks:
      - grants-framework

################################################################################

  config-browser:
    build: ./
    ports:
      - '3000:3000'
    depends_on:
      redis:
        condition: service_started
    env_file:
      - 'compose/aws.env'
    environment:
      PORT: 3000
      NODE_ENV: development
      REDIS_HOST: redis
      AWS_ENDPOINT_URL: http://localstack:4566
      USE_SINGLE_INSTANCE_CACHE: true
      GRANTS_CONFIG_BROKER_API_ENDPOINT: http://grants-config-broker:3001
      CONFIG_VERSION_QUEUE_URL: http://localstack:4566/000000000000/gfr__sqs__config_browser_updates
      FEDERATED_CREDENTIALS_ENABLE_MOCKING: "${FEDERATED_CREDENTIALS_ENABLE_MOCKING:-true}"
      APP_BASE_URL: http://localhost:3000
    networks:
      - grants-framework

################################################################################

networks:
  grants-framework:
    external: true
    name: grants-framework
